steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/devcloud-backend:latest', '-f', 'backend/Dockerfile', '.']
    id: 'build-backend'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/devcloud-frontend:latest', '-f', 'frontend/Dockerfile', '.']
    id: 'build-frontend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/devcloud-backend:latest']
    id: 'push-backend'

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/devcloud-frontend:latest']
    id: 'push-frontend'

images:
  - 'gcr.io/$PROJECT_ID/devcloud-backend:latest'
  - 'gcr.io/$PROJECT_ID/devcloud-frontend:latest'

timeout: '1800s'
