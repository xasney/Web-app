steps:
  # Build backend image (run from backend directory so Dockerfile is found)
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/devcloud-backend:latest', '.']
    id: 'build-backend'

  # Build frontend image (run from frontend directory)
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'frontend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/devcloud-frontend:latest', '.']
    id: 'build-frontend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/devcloud-backend:latest']
    id: 'push-backend'

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/devcloud-frontend:latest']
    id: 'push-frontend'

images:
  - 'gcr.io/$PROJECT_ID/devcloud-backend:latest'
  - 'gcr.io/$PROJECT_ID/devcloud-frontend:latest'

timeout: '1800s'
